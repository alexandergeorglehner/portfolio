<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alexander Georg Lehner</title>
  <style>
    body {
      margin: 0;
      font-family: Helvetica, Arial, sans-serif;
    }

    .video-container {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .footer {
      position: absolute;
      bottom: 20px;
      right: 20px;
    }

    a {
      text-decoration: none;
      color: black;
    }

    #sound-toggle {
  position: absolute;
  bottom: 20px;
  left: 20px;
  color: white;
  background: rgba(0,0,0,0.4);
  padding: 8px 12px;
  cursor: pointer;
  font-size: 14px;
  backdrop-filter: blur(5px);
}
  </style>
</head>
<body>

<div class="video-container">
  <iframe src="https://player.vimeo.com/video/1176343509?autoplay=1&muted=1&loop=1&title=0&byline=0&portrait=0&controls=0"
    frameborder="0"
    allow="autoplay; fullscreen">
  </iframe>
  <div id="sound-toggle">Sound on</div>
</div>

<div class="footer">
  <a href="contact.html">Contact</a>
</div>
<script src="https://player.vimeo.com/api/player.js"></script>

<script>
  const iframe = document.querySelector("iframe");
  const player = new Vimeo.Player(iframe);
  const button = document.getElementById("sound-toggle");

  button.onclick = function() {
    player.setVolume(1);
    player.setMuted(false);
    button.style.display = "none";
  };
</script>
</body>
</html>
